<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ls_slides minimal deck</title>
    <link rel="stylesheet" href="./ls-slides/registry/core/base/reset.css" />
    <link rel="stylesheet" href="./ls-slides/registry/core/base/tokens.css" />
    <link rel="stylesheet" href="./ls-slides/registry/core/base/slide.css" />
    <link rel="stylesheet" href="./ls-slides/registry/layouts/title-hero/title-hero.css" />
    <link rel="stylesheet" href="./ls-slides/registry/animations/reveal/reveal.css" />
    <script type="module" src="./ls-slides/registry/core/base/slide-runtime.js"></script>
  </head>
  <body class="ls-page">
    <main class="ls-deck" data-ls-deck aria-label="Minimal ls_slides deck">
      <section class="ls-slide" aria-label="Opening">
        <div class="ls-slide__inner ls-title-hero">
          <div class="ls-title-hero__content">
            <p class="ls-eyebrow">Replace this</p>
            <h1 class="ls-title">A minimal copyable deck</h1>
            <p class="ls-subtitle ls-reveal" data-step="1">
              Use this shell only as a starting point.
            </p>
          </div>
        </div>
      </section>
      <section class="ls-slide" aria-label="Second slide">
        <div class="ls-slide__inner">
          <header class="ls-slide__header">
            <p class="ls-eyebrow">Next</p>
            <h2 class="ls-title">Add selected primitives</h2>
          </header>
          <div class="ls-slide__body">
            <p class="ls-subtitle">Copy more registry items as the deck needs them.</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
