<section class="ls-slide" data-ls-slide-kind="content" aria-label="Edge-running figure">
  <div class="ls-slide__inner">
    <header class="ls-slide__header">
      <p class="ls-eyebrow">Bleed</p>
      <h2 class="ls-title">Media can run to the slide edge.</h2>
    </header>
    <div class="ls-slide__body">
      <div class="ls-layout ls-layout--wide-start">
        <div class="ls-layout__region">
          <h3 class="ls-layout__heading">The edge is a choice</h3>
          <p class="ls-layout__text">
            A bleed region escapes the slide padding on its outer edges, so a figure reads as part
            of the slide's architecture rather than a framed insert.
          </p>
          <p class="ls-layout__note">Use on the last region of a split</p>
        </div>
        <div class="ls-layout__region ls-layout__region--bleed">
          <figure class="ls-figure ls-figure--abstract ls-figure--fill ls-figure--edge">
            <div class="ls-figure__media" aria-hidden="true"></div>
          </figure>
        </div>
      </div>
    </div>
    <footer class="ls-slide__footer">
      <span>Layout system</span>
      <span data-ls-page-number></span>
    </footer>
  </div>
</section>
