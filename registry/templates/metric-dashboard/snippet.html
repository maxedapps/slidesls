<section class="ls-slide" data-ls-slide-kind="content" aria-label="Metric dashboard slide">
  <div class="ls-slide__inner">
    <header class="ls-slide__header">
      <p class="ls-eyebrow">Progress</p>
      <h2 class="ls-title">Show measurable movement.</h2>
    </header>
    <div class="ls-grid ls-grid--3">
      <div class="ls-metric">
        <strong class="ls-metric__value">3×</strong>
        <span class="ls-metric__label">Faster deck assembly</span>
      </div>
      <div class="ls-metric">
        <strong class="ls-metric__value">0</strong>
        <span class="ls-metric__label">Runtime dependencies</span>
      </div>
      <div class="ls-panel">
        <div
          class="ls-progress"
          style="--ls-progress-value: 72%"
          role="progressbar"
          aria-label="Registry cleanup"
          aria-valuenow="72"
          aria-valuemin="0"
          aria-valuemax="100"
        >
          <div class="ls-progress__label">
            <span>Registry cleanup</span>
            <span class="ls-progress__value">72%</span>
          </div>
          <div class="ls-progress__track"><div class="ls-progress__bar"></div></div>
        </div>
      </div>
    </div>
  </div>
</section>
