<section class="ls-slide" data-ls-density="compact" aria-label="API flow">
  <div class="ls-slide__inner">
    <header class="ls-stack ls-stack--sm">
      <p class="ls-eyebrow">API flow</p>
      <h2 class="ls-title">Connect the request contract to the user-visible result.</h2>
    </header>
    <div class="ls-grid ls-grid--2">
      <div class="ls-http-exchange" data-ls-density="compact">
        <figure class="ls-http-exchange__block">
          <figcaption class="ls-http-exchange__header">
            <span class="ls-http-exchange__method">POST</span>
            <span class="ls-http-exchange__url">/api/decks/preview</span>
          </figcaption>
          <pre><code>{ "entry": "index.html" }</code></pre>
        </figure>
        <figure class="ls-http-exchange__block">
          <figcaption class="ls-http-exchange__header">
            <span class="ls-http-exchange__status" data-ls-tone="success">200 OK</span>
            <span class="ls-http-exchange__url">application/json</span>
          </figcaption>
          <pre><code>{ "exportUrl": "...?export=1" }</code></pre>
        </figure>
      </div>
      <figure class="ls-code-diff" data-ls-density="compact">
        <figcaption class="ls-code-diff__header">
          <span>client.ts</span>
          <span>state update</span>
        </figcaption>
        <div class="ls-code-diff__body" role="list" aria-label="API flow code diff">
          <div class="ls-code-diff__line" data-ls-diff="remove" role="listitem">
            <span class="ls-code-diff__number">12</span>
            <span class="ls-code-diff__code"
              ><span class="ls-code-diff__marker">-</span>renderPreview(url);</span
            >
          </div>
          <div class="ls-code-diff__line" data-ls-diff="add" role="listitem">
            <span class="ls-code-diff__number">12</span>
            <span class="ls-code-diff__code"
              ><span class="ls-code-diff__marker">+</span>renderPreview(result.exportUrl);</span
            >
          </div>
        </div>
      </figure>
    </div>
  </div>
</section>
