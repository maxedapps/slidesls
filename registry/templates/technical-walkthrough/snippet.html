<section
  class="ls-slide"
  data-ls-slide-kind="content"
  data-ls-density="compact"
  aria-label="Technical walkthrough"
>
  <div class="ls-slide__inner">
    <header class="ls-slide__header">
      <p class="ls-eyebrow">Technical walkthrough</p>
      <h2 class="ls-title">Show the moving parts before the implementation details.</h2>
    </header>
    <div class="ls-grid ls-grid--wide-left">
      <ul class="ls-file-tree" data-ls-density="compact" aria-label="Project structure">
        <li class="ls-file-tree__item" data-ls-kind="folder">
          <span class="ls-file-tree__name">deck/</span>
          <ul>
            <li class="ls-file-tree__item" data-ls-state="active">
              <span class="ls-file-tree__name">index.html</span>
              <span class="ls-file-tree__meta">entry</span>
            </li>
            <li class="ls-file-tree__item" data-ls-kind="folder">
              <span class="ls-file-tree__name">slidesls/</span>
              <span class="ls-file-tree__meta">assets</span>
            </li>
          </ul>
        </li>
      </ul>
      <figure class="ls-terminal" data-ls-density="compact">
        <figcaption class="ls-terminal__header">
          <span class="ls-terminal__title">validate-and-preview.sh</span>
        </figcaption>
        <div class="ls-terminal__body">
          <p class="ls-terminal__line">
            <span class="ls-terminal__prompt">$</span> slidesls validate ./deck --json
          </p>
          <p class="ls-terminal__line ls-terminal__output">{ "ok": true, "warnings": [] }</p>
          <p class="ls-terminal__line">
            <span class="ls-terminal__prompt">$</span> slidesls preview ./deck
          </p>
        </div>
      </figure>
    </div>
  </div>
</section>
