<section
  class="ls-slide"
  data-ls-slide-kind="content"
  data-ls-archetype="comparison"
  aria-label="Before and after"
>
  <div class="ls-slide__inner">
    <header class="ls-slide__header">
      <p class="ls-eyebrow">Before / after</p>
      <h2 class="ls-title">The checkout, one release later.</h2>
    </header>
    <div class="ls-slide__body">
      <div class="ls-layout ls-layout--split">
        <div class="ls-layout__region">
          <h3 class="ls-layout__heading">Before</h3>
          <div class="ls-stat">
            <span class="ls-stat__value">610<em>ms</em></span>
            <span class="ls-stat__label">p95 time to payment sheet</span>
          </div>
          <p class="ls-layout__note">Four-step wizard</p>
        </div>
        <div class="ls-layout__region">
          <h3 class="ls-layout__heading">After</h3>
          <div class="ls-stat">
            <span class="ls-stat__value">218<em>ms</em></span>
            <span class="ls-stat__label">p95 time to payment sheet</span>
            <span class="ls-stat__delta">↓ 64% in one release</span>
          </div>
          <p class="ls-layout__note">Single-page flow</p>
        </div>
      </div>
    </div>
    <footer class="ls-slide__footer">
      <span>Checkout rebuild</span>
      <span data-ls-page-number></span>
    </footer>
  </div>
</section>
