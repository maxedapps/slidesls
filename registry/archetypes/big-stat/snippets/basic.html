<section
  class="ls-slide"
  data-ls-slide-kind="content"
  data-ls-archetype="big-stat"
  aria-label="Key numbers"
>
  <div class="ls-slide__inner">
    <header class="ls-slide__header">
      <p class="ls-eyebrow">Results</p>
      <h2 class="ls-title">The gateway got out of the way.</h2>
    </header>
    <div class="ls-slide__body">
      <div class="ls-layout ls-layout--statement">
        <div class="ls-grid ls-grid--3">
          <div class="ls-stat ls-stat--xl">
            <span class="ls-stat__value">99.99%</span>
            <span class="ls-stat__label">uptime across four regions</span>
          </div>
          <div class="ls-stat ls-stat--xl">
            <span class="ls-stat__value">3.4×</span>
            <span class="ls-stat__label">more requests served per node</span>
            <span class="ls-stat__delta">↑ from 1.0× at baseline</span>
          </div>
          <div class="ls-stat ls-stat--xl">
            <span class="ls-stat__value">12<em>ms</em></span>
            <span class="ls-stat__label">p99 added by the gateway</span>
            <span class="ls-stat__delta">↓ 31ms less than before</span>
          </div>
        </div>
        <p class="ls-layout__text">
          Six months of hardening, measured on production traffic — not a benchmark rig.
        </p>
      </div>
    </div>
    <footer class="ls-slide__footer">
      <span>API platform review</span>
      <span data-ls-page-number></span>
    </footer>
  </div>
</section>
