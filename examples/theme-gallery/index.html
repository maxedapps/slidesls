<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>slidesls theme gallery</title>
    <style>
      body {
        margin: 0;
        background: #0b0d12;
        color: #f5f7fb;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      main {
        display: grid;
        gap: 28px;
        padding: 32px;
      }
      h1 {
        margin: 0;
        font-size: 40px;
      }
      .gallery {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 24px;
      }
      iframe {
        inline-size: 100%;
        aspect-ratio: 16 / 9;
        border: 1px solid rgb(255 255 255 / 14%);
        border-radius: 18px;
        background: #111318;
      }
      a {
        color: #bfdbfe;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>slidesls theme gallery</h1>
        <p>Representative slides for the first four clean theme presets.</p>
      </header>
      <section class="gallery" aria-label="Theme previews">
        <iframe title="executive-blue" src="./executive-blue.html"></iframe>
        <iframe title="boardroom-navy" src="./boardroom-navy.html"></iframe>
        <iframe title="technical-deep" src="./technical-deep.html"></iframe>
        <iframe title="playful-ink" src="./playful-ink.html"></iframe>
      </section>
    </main>
  </body>
</html>
